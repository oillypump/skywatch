version: "3.7"
services:
  trino-coordinator:
    image: "trinodb/trino:latest"
    hostname: trino-coordinator
    ports:
      - "8080:8080"
    volumes:
      - ./etc:/etc/trino
    networks:
      - trino-network
    depends_on:
      hive-metastore:
        condition: service_healthy

  metastore-db:
    image: postgres:16
    container_name: metastore-db
    hostname: metastore-db
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - metastore-db:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - trino-network

  hive-metastore:
    build:
      context: ./Dockerfile/metastore
      dockerfile: Dockerfile.metastore
    container_name: hive-metastore
    hostname: hive-metastore
    ports:
      - "9083:9083"
    volumes:
      - ./Dockerfile/metastore/conf/metastore-site.xml:/opt/hive/conf/metastore-site.xml:ro
    command: ["/bin/bash", "/opt/hive/conf/entrypoint.sh"]
    environment:
      DB_DRIVER: postgres
      HIVE_METASTORE_DB_TYPE: postgres
      METASTORE_DB_HOSTNAME: metastore-db
      METASTORE_DB_PORT: 5432
      METASTORE_DB_NAME: metastore
      METASTORE_DB_USER: hive
      METASTORE_DB_PASSWORD: hive
      SERVICE_NAME: metastore
    depends_on:
      - metastore-db
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/9083'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trino-network

  minio:
    image: "minio/minio:latest"
    hostname: minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: server --console-address ":9001" /data
    networks:
      - trino-network

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    hostname: metabase
    volumes:
      - /dev/urandom:/dev/random:ro
    ports:
      - 3000:3000
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabasedb
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
      MB_DB_HOST: metastore-db
    networks:
      - trino-network
    healthcheck:
      test: curl --fail -I http://localhost:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  minio-data:
    driver: local
  metastore-db:
  spark-events:

networks:
  trino-network:
    driver: bridge
